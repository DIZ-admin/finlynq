name: Mobile Build (EAS)

# Produces the actual app binary (APK/AAB) via EAS Build.
# Opt-in / deliberate only — NOT on every push — so it doesn't burn EAS build
# quota or auto-increment the production versionCode unintentionally:
#   * manual:  Actions tab → "Mobile Build (EAS)" → Run workflow (pick platform/profile)
#   * release: push a tag like `mobile-v1.2.0`  (builds android / production)
#
# Requires one repo secret:  EXPO_TOKEN  (Expo account → Access tokens)
#   Settings → Secrets and variables → Actions → New repository secret.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        type: choice
        options: [android, ios, all]
        default: android
      profile:
        description: EAS build profile
        type: choice
        options: [preview, production]
        default: preview
  push:
    tags: ['mobile-v*']

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: EAS build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      # mobile/ is a subdirectory, not the git root, so EAS must archive the
      # working directory instead of using git VCS integration (same as local).
      EAS_NO_VCS: '1'
    steps:
      - name: Require EXPO_TOKEN
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "::error::EXPO_TOKEN repo secret is not set. Add it under Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: EAS build
        # Tag pushes carry no inputs, so they fall back to android / production.
        # Drop --no-wait if you'd rather the job return as soon as the build is queued.
        run: |
          PLATFORM="${{ github.event.inputs.platform || 'android' }}"
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          echo "Building platform=$PLATFORM profile=$PROFILE"
          eas build --non-interactive --platform "$PLATFORM" --profile "$PROFILE"
