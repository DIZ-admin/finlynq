name: CLA

# Contributor License Agreement gate (contributor-assistant).
#
# Activation notes:
#   * pull_request_target uses this file from the PR's BASE branch — since all
#     external PRs target `dev` (see CONTRIBUTING.md), the signing check is
#     active as soon as this file is on `dev`.
#   * issue_comment only fires from the DEFAULT branch (`main`), so signature
#     recording via PR comment goes live with the next dev → main promotion.
#     Until then the check will flag unsigned PRs but comments won't be
#     auto-processed.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: '.github/cla/signatures.json'
          path-to-document: 'https://github.com/finlynq/finlynq/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'HussienH,*[bot]'
